<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --red: #f85149;
  --green: #3fb950;
  --yellow: #d29922;
  --orange: #db6d28;
  --blue: #58a6ff;
  --purple: #bc8cff;
  --high-risk: #f85149;
  --mid-risk: #d29922;
  --low-risk: #3fb950;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, #161b22 0%, #1a1f2e 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 30px;
  position: sticky; top: 0; z-index: 100;
}

.header h1 {
  font-size: 22px;
  font-weight: 700;
  display: flex; align-items: center; gap: 10px;
}

.header h1 .badge {
  background: var(--red);
  color: #fff;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}

.header .meta {
  color: var(--text2);
  font-size: 13px;
  margin-top: 5px;
}

.summary-bar {
  display: flex; gap: 15px;
  padding: 15px 30px;
  overflow-x: auto;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}

.summary-card {
  flex: 1;
  min-width: 140px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  text-align: center;
}

.summary-card .label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.summary-card .value { font-size: 20px; font-weight: 700; }
.summary-card .sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

.container { padding: 20px 30px; }

.section-title {
  font-size: 16px;
  font-weight: 600;
  margin: 25px 0 15px;
  display: flex; align-items: center; gap: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.section-title .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}

.alert-banner {
  background: linear-gradient(90deg, rgba(248,81,73,0.15) 0%, rgba(219,109,40,0.15) 100%);
  border: 1px solid rgba(248,81,73,0.3);
  border-radius: 8px;
  padding: 12px 20px;
  margin-bottom: 20px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.alert-banner .icon { font-size: 18px; color: var(--red); }
.alert-banner .content { font-size: 13px; line-height: 1.6; }
.alert-banner strong { color: var(--red); }

.stock-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}

.stock-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}

.stock-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

.stock-card .card-header {
  padding: 14px 16px 10px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid var(--border);
}

.stock-card .stock-name {
  font-size: 15px;
  font-weight: 700;
}

.stock-card .stock-code {
  font-size: 12px;
  color: var(--text2);
}

.stock-card .risk-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 12px;
  white-space: nowrap;
}

.risk-high { background: rgba(248,81,73,0.2); color: var(--red); border: 1px solid rgba(248,81,73,0.3); }
.risk-mid { background: rgba(210,153,34,0.2); color: var(--yellow); border: 1px solid rgba(210,153,34,0.3); }
.risk-low { background: rgba(63,185,80,0.2); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }

.stock-card .price-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 10px 16px;
}

.stock-card .price {
  font-size: 22px;
  font-weight: 700;
}

.stock-card .change {
  font-size: 13px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
}

.change-up { background: rgba(248,81,73,0.15); color: var(--red); }
.change-down { background: rgba(63,185,80,0.15); color: var(--green); }

.stock-card .indicators {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  padding: 0;
  font-size: 12px;
}

.stock-card .indicators .ind-item {
  padding: 8px 16px;
  border-top: 1px solid var(--border);
}

.stock-card .indicators .ind-item:not(:nth-child(3n)) {
  border-right: 1px solid var(--border);
}

.ind-item .ind-label { color: var(--text2); font-size: 10px; }
.ind-item .ind-value { font-weight: 600; margin-top: 2px; }

.stock-card .risk-factors {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  font-size: 12px;
}

.stock-card .risk-factors .rf-title {
  color: var(--text2);
  font-size: 10px;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stock-card .risk-factors .rf-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.rf-tag {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(248,81,73,0.1);
  color: var(--red);
  border: 1px solid rgba(248,81,73,0.2);
}

.rf-tag.warn {
  background: rgba(210,153,34,0.1);
  color: var(--yellow);
  border-color: rgba(210,153,34,0.2);
}

.rf-tag.info {
  background: rgba(88,166,255,0.1);
  color: var(--blue);
  border-color: rgba(88,166,255,0.2);
}

.money-flow-section {
  margin-top: 25px;
}

.money-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.money-table th {
  text-align: left;
  padding: 10px 14px;
  background: var(--card);
  border-bottom: 2px solid var(--border);
  color: var(--text2);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.money-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}

.money-table tr:hover { background: rgba(88,166,255,0.05); }

.flow-bar {
  display: inline-block;
  height: 8px;
  border-radius: 4px;
  min-width: 4px;
  vertical-align: middle;
  margin-left: 6px;
}

.flow-out { background: var(--green); }
.flow-in { background: var(--red); }

.chart-container {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 20px;
}

.chart-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.risk-rank {
  list-style: none;
  padding: 0;
}

.risk-rank li {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.risk-rank .rank-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
}

.rank-1 { background: rgba(248,81,73,0.3); color: var(--red); }
.rank-2 { background: rgba(219,109,40,0.3); color: var(--orange); }
.rank-3 { background: rgba(210,153,34,0.3); color: var(--yellow); }
.rank-other { background: rgba(88,166,255,0.15); color: var(--blue); }

.risk-rank .rank-info { flex: 1; }
.risk-rank .rank-name { font-weight: 600; font-size: 14px; }
.risk-rank .rank-desc { font-size: 11px; color: var(--text2); margin-top: 2px; }
.risk-rank .rank-score { font-size: 20px; font-weight: 700; }

.footer {
  text-align: center;
  padding: 30px;
  color: var(--text2);
  font-size: 12px;
  border-top: 1px solid var(--border);
  margin-top: 30px;
}

.tab-bar {
  display: flex;
  gap: 0;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.tab-btn {
  padding: 10px 20px;
  background: none;
  border: none;
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}

.tab-btn.active {
  color: var(--text);
  border-bottom-color: var(--blue);
}

.tab-btn:hover { color: var(--text); }

.tab-content { display: none; }
.tab-content.active { display: block; }

@media (max-width: 768px) {
  .container { padding: 15px; }
  .stock-grid { grid-template-columns: 1fr; }
  .chart-row { grid-template-columns: 1fr; }
  .summary-bar { flex-wrap: wrap; }
  .summary-card { min-width: 100px; }
}

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.stock-card { animation: fadeIn 0.4s ease-out; }
.stock-card:nth-child(2) { animation-delay: 0.05s; }
.stock-card:nth-child(3) { animation-delay: 0.1s; }
.stock-card:nth-child(4) { animation-delay: 0.15s; }
.stock-card:nth-child(5) { animation-delay: 0.2s; }
.stock-card:nth-child(6) { animation-delay: 0.25s; }
.stock-card:nth-child(7) { animation-delay: 0.3s; }
.stock-card:nth-child(8) { animation-delay: 0.35s; }
.stock-card:nth-child(9) { animation-delay: 0.4s; }
.stock-card:nth-child(10) { animation-delay: 0.45s; }
</style>
</head>

// ===== 风险评分 =====
const sortedByRisk = [...stocks].sort((a, b) => b.riskScore - a.riskScore);

// ===== 渲染函数 =====
function init() {
  renderSummary();
  renderAlertBanner();
  renderStockGrid();
  renderMoneyTable();
  renderRiskRank();
  renderDetail();
  initCharts();
}

function renderSummary() {
  const highRisk = stocks.filter(s => s.riskLevel === 'high').length;
  const midRisk = stocks.filter(s => s.riskLevel === 'mid').length;
  const totalFlow = stocks.reduce((sum, s) => sum + s.netMoneyFlow, 0);
  const lossCount = stocks.filter(s => s.profitDedt < 0).length;
  const decreaseCount = stocks.filter(s => s.forecast.includes('预减') || s.forecast.includes('续亏')).length;

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-card">
      <div class="label">监控总数</div>
      <div class="value">${stocks.length}</div>
      <div class="sub">只股票</div>
    </div>
    <div class="summary-card">
      <div class="label">高风险</div>
      <div class="value" style="color:var(--red)">${highRisk}</div>
      <div class="sub">需要警惕</div>
    </div>
    <div class="summary-card">
      <div class="label">中等风险</div>
      <div class="value" style="color:var(--yellow)">${midRisk}</div>
      <div class="sub">需关注</div>
    </div>
    <div class="summary-card">
      <div class="label">累计资金净流出</div>
      <div class="value" style="color:var(--green)">${(totalFlow/10000).toFixed(1)}亿</div>
      <div class="sub">近7日</div>
    </div>
    <div class="summary-card">
      <div class="label">亏损公司</div>
      <div class="value" style="color:${lossCount > 0 ? 'var(--red)' : 'var(--green)'}">${lossCount}</div>
      <div class="sub">2024Q3扣非</div>
    </div>
    <div class="summary-card">
      <div class="label">业绩预减/续亏</div>
      <div class="value" style="color:${decreaseCount > 0 ? 'var(--red)' : 'var(--green)'}">${decreaseCount}</div>
      <div class="sub">需警惕</div>
    </div>
  `;
}

function renderAlertBanner() {
  const alerts = [];
  stocks.forEach(s => {
    if (s.riskScore >= 85) {
      alerts.push(`<strong>${s.name}(${s.code})</strong>：${s.riskDesc}`);
    }
  });
  
  document.getElementById('alertContent').innerHTML = `
    <strong>🚨 紧急风险预警（${alerts.length}只）</strong><br>
    ${alerts.join('<hr style="border-color:rgba(248,81,73,0.2);margin:8px 0">')}
    <div style="margin-top:8px;color:var(--text2)">提示：以下${stocks.filter(s => s.riskScore >= 60).length}只股票风险评分≥60，建议重点关注并考虑减仓。</div>
  `;
}

function renderStockGrid() {
  const grid = document.getElementById('stockGrid');
  grid.innerHTML = stocks.map(s => {
    const riskClass = s.riskLevel === 'high' ? 'risk-high' : s.riskLevel === 'mid' ? 'risk-mid' : 'risk-low';
    const riskLabel = s.riskLevel === 'high' ? '高风险' : s.riskLevel === 'mid' ? '中风险' : '低风险';
    const chgClass = s.pctChg >= 0 ? 'change-up' : 'change-down';
    const chgText = s.pctChg >= 0 ? `+${s.pctChg.toFixed(2)}%` : `${s.pctChg.toFixed(2)}%`;
    const peText = s.peTTM ? s.peTTM.toFixed(1) : '亏损';
    const flowColor = s.netMoneyFlow >= 0 ? 'var(--red)' : 'var(--green)';
    const flowText = s.netMoneyFlow >= 0 ? `+${(s.netMoneyFlow/10000).toFixed(1)}亿` : `${(s.netMoneyFlow/10000).toFixed(1)}亿`;

    return `
      <div class="stock-card">
        <div class="card-header">
          <div>
            <div class="stock-name">${s.name}</div>
            <div class="stock-code">${s.code} · ${s.industry} · ${s.area}</div>
          </div>
          <span class="risk-badge ${riskClass}">${riskLabel} ${s.riskScore}分</span>
        </div>
        <div class="price-row">
          <span class="price" style="color:${s.pctChg >= 0 ? 'var(--red)' : 'var(--green)'}">${s.price.toFixed(2)}</span>
          <span class="change ${chgClass}">${chgText}</span>
          <span style="font-size:12px;color:var(--text2);margin-left:auto">成交额 ${s.volume >= 10000 ? (s.volume/10000).toFixed(2)+'亿' : s.volume.toFixed(0)+'万'}</span>
        </div>
        <div class="indicators">
          <div class="ind-item">
            <div class="ind-label">PE(TTM)</div>
            <div class="ind-value" style="color:${s.peTTM > 100 ? 'var(--red)' : 'var(--text)'}">${peText}</div>
          </div>
          <div class="ind-item">
            <div class="ind-label">PB</div>
            <div class="ind-value" style="color:${s.pb > 10 ? 'var(--red)' : 'var(--text)'}">${s.pb.toFixed(2)}</div>
          </div>
          <div class="ind-item">
            <div class="ind-label">换手率</div>
            <div class="ind-value" style="color:${s.turnover > 10 ? 'var(--yellow)' : 'var(--text)'}">${s.turnover.toFixed(1)}%</div>
          </div>
          <div class="ind-item">
            <div class="ind-label">ROE</div>
            <div class="ind-value" style="color:${s.roe < 0 ? 'var(--red)' : 'var(--text)'}">${s.roe.toFixed(1)}%</div>
          </div>
          <div class="ind-item">
            <div class="ind-label">负债率</div>
            <div class="ind-value" style="color:${s.debtRatio > 70 ? 'var(--red)' : 'var(--text)'}">${s.debtRatio.toFixed(1)}%</div>
          </div>
          <div class="ind-item">
            <div class="ind-label">资金流向</div>
            <div class="ind-value" style="color:${flowColor}">${flowText}</div>
          </div>
        </div>
        <div class="risk-factors">
          <div class="rf-title">风险因素</div>
          <div class="rf-list">
            ${s.tags.map(t => {
              const cls = t.includes('亏损') || t.includes('ST') || t.includes('大幅') || t.includes('极端') || t.includes('极高') || t.includes('异常') ? '' : t.includes('偏高') || t.includes('流出') || t.includes('减持') || t.includes('下跌') ? 'warn' : 'info';
              return `<span class="rf-tag ${cls}">${t}</span>`;
            }).join('')}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function renderMoneyTable() {
  const sorted = [...stocks].sort((a, b) => a.netMoneyFlow - b.netMoneyFlow);
  const tbody = document.getElementById('moneyTableBody');
  tbody.innerHTML = sorted.map(s => {
    const flowText = Math.abs(s.netMoneyFlow) > 100000 ? `${(Math.abs(s.netMoneyFlow)/10000).toFixed(1)}亿` : `${Math.abs(s.netMoneyFlow).toFixed(0)}万`;
    const flowDir = s.netMoneyFlow >= 0 ? '净流入' : '净流出';
    const flowColor = s.netMoneyFlow >= 0 ? 'var(--red)' : 'var(--green)';
    const barWidth = Math.min(Math.abs(s.netMoneyFlow) / 4000, 200);
    const riskHints = [];
    if (s.netMoneyFlow < -100000) riskHints.push('🔴 主力大幅出逃');
    else if (s.netMoneyFlow < -30000) riskHints.push('🟡 资金持续流出');
    else if (s.netMoneyFlow > 50000) riskHints.push('🟢 资金持续流入');

    return `
      <tr>
        <td><strong>${s.name}</strong><br><span style="color:var(--text2);font-size:11px">${s.code}</span></td>
        <td>
          <span style="color:${flowColor};font-weight:600">${flowDir} ${flowText}</span>
          <span class="flow-bar ${s.netMoneyFlow >= 0 ? 'flow-in' : 'flow-out'}" style="width:${barWidth}px"></span>
        </td>
        <td>${s.netMoneyFlow >= 0 ? '📈 主力积极' : s.netMoneyFlow < -50000 ? '📉 主力撤离' : '↔️ 资金平衡'}</td>
        <td>${s.holderTrade.includes('减持') ? '⚠️ 有股东减持' : '—'}</td>
        <td>${riskHints.join(' ')}</td>
      </tr>
    `;
  }).join('');
}

function renderRiskRank() {
  const ul = document.getElementById('riskRank');
  ul.innerHTML = sortedByRisk.map((s, i) => {
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
    const scoreColor = s.riskScore >= 70 ? 'var(--red)' : s.riskScore >= 50 ? 'var(--yellow)' : 'var(--green)';
    return `
      <li>
        <div class="rank-num ${rankClass}">${i + 1}</div>
        <div class="rank-info">
          <div class="rank-name">${s.name} <span style="color:var(--text2);font-size:12px">${s.code}</span></div>
          <div class="rank-desc">${s.tags.slice(0,3).join(' · ')}</div>
        </div>
        <div class="rank-score" style="color:${scoreColor}">${s.riskScore}</div>
      </li>
    `;
  }).join('');
}

function renderDetail() {
  const container = document.getElementById('detailContent');
  container.innerHTML = sortedByRisk.map(s => {
    const riskClass = s.riskLevel === 'high' ? 'risk-high' : s.riskLevel === 'mid' ? 'risk-mid' : 'risk-low';
    const riskLabel = s.riskLevel === 'high' ? '高风险' : s.riskLevel === 'mid' ? '中风险' : '低风险';
    const peText = s.peTTM ? s.peTTM.toFixed(1) : '亏损（无法计算）';
    const mvText = s.totalMv >= 10000 ? `${(s.totalMv/10000).toFixed(0)}亿` : `${s.totalMv.toFixed(0)}万`;

    return `
      <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div>
            <span style="font-size:18px;font-weight:700">${s.name}</span>
            <span style="color:var(--text2);margin-left:8px">${s.code}</span>
            <span style="color:var(--text2);margin-left:8px">| ${s.industry} | ${s.area}</span>
            <span style="color:var(--text2);margin-left:8px">| 实控人：${s.actName}</span>
          </div>
          <span class="risk-badge ${riskClass}">${riskLabel} ${s.riskScore}分</span>
        </div>
        
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;font-size:13px">
          <div><span style="color:var(--text2)">最新价：</span><strong style="color:${s.pctChg>=0?'var(--red)':'var(--green)'}">${s.price} (${s.pctChg>=0?'+':''}${s.pctChg}%)</strong></div>
          <div><span style="color:var(--text2)">PE(TTM)：</span><strong>${peText}</strong></div>
          <div><span style="color:var(--text2)">PB：</span><strong>${s.pb}</strong></div>
          <div><span style="color:var(--text2)">ROE：</span><strong style="color:${s.roe<0?'var(--red)':'inherit'}">${s.roe}%</strong></div>
          <div><span style="color:var(--text2)">负债率：</span><strong style="color:${s.debtRatio>70?'var(--red)':'inherit'}">${s.debtRatio}%</strong></div>
          <div><span style="color:var(--text2)">流动比率：</span><strong style="color:${s.currentRatio<1?'var(--red)':'inherit'}">${s.currentRatio}</strong></div>
          <div><span style="color:var(--text2)">市值：</span><strong>${mvText}</strong></div>
          <div><span style="color:var(--text2)">股息率：</span><strong>${s.dvTTM || '无'}%</strong></div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;font-size:13px;margin-bottom:12px">
          <div style="background:var(--bg);padding:12px;border-radius:8px">
            <div style="color:var(--text2);font-size:11px;margin-bottom:6px">📊 业绩预告</div>
            <div>${s.forecast}</div>
          </div>
          <div style="background:var(--bg);padding:12px;border-radius:8px">
            <div style="color:var(--text2);font-size:11px;margin-bottom:6px">💰 股东增减持</div>
            <div>${s.holderTrade}</div>
          </div>
          <div style="background:var(--bg);padding:12px;border-radius:8px">
            <div style="color:var(--text2);font-size:11px;margin-bottom:6px">🔓 限售解禁</div>
            <div>${s.unlockInfo}</div>
          </div>
          <div style="background:var(--bg);padding:12px;border-radius:8px">
            <div style="color:var(--text2);font-size:11px;margin-bottom:6px">📜 ST历史</div>
            <div>${s.stHistory}</div>
          </div>
        </div>

        <div style="background:${s.riskLevel === 'high' ? 'rgba(248,81,73,0.08)' : s.riskLevel === 'mid' ? 'rgba(210,153,34,0.08)' : 'rgba(63,185,80,0.08)'};padding:14px;border-radius:8px;border-left:3px solid ${s.riskLevel === 'high' ? 'var(--red)' : s.riskLevel === 'mid' ? 'var(--yellow)' : 'var(--green)'}">
          <div style="font-weight:600;margin-bottom:6px">📌 风险评估意见</div>
          <div style="font-size:13px;line-height:1.7">${s.riskDesc}</div>
        </div>
      </div>
    `;
  }).join('');
}

function initCharts() {
  // 资金流向图
  const flowSorted = [...stocks].sort((a, b) => a.netMoneyFlow - b.netMoneyFlow);
  new Chart(document.getElementById('moneyFlowChart'), {
    type: 'bar',
    data: {
      labels: flowSorted.map(s => s.name),
      datasets: [{
        data: flowSorted.map(s => s.netMoneyFlow / 10000),
        backgroundColor: flowSorted.map(s => s.netMoneyFlow >= 0 ? 'rgba(248,81,73,0.7)' : 'rgba(63,185,80,0.7)'),
        borderColor: flowSorted.map(s => s.netMoneyFlow >= 0 ? '#f85149' : '#3fb950'),
        borderWidth: 1
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.parsed.x.toFixed(1)} 亿元`
          }
        }
      },
      scales: {
        x: {
          title: { display: true, text: '亿元', color: '#8b949e' },
          grid: { color: 'rgba(48,54,61,0.5)' },
          ticks: { color: '#8b949e' }
        },
        y: {
          grid: { display: false },
          ticks: { color: '#e6edf3', font: { size: 12 } }
        }
      }
    }
  });

  // 换手率图
  const turnSorted = [...stocks].sort((a, b) => b.turnover - a.turnover);
  new Chart(document.getElementById('turnoverChart'), {
    type: 'bar',
    data: {
      labels: turnSorted.map(s => s.name),
      datasets: [{
        data: turnSorted.map(s => s.turnover),
        backgroundColor: turnSorted.map(s => s.turnover > 15 ? 'rgba(248,81,73,0.7)' : s.turnover > 5 ? 'rgba(210,153,34,0.7)' : 'rgba(88,166,255,0.7)'),
        borderWidth: 0,
        borderRadius: 4
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `换手率 ${ctx.parsed.x.toFixed(1)}%`
          }
        }
      },
      scales: {
        x: {
          title: { display: true, text: '%', color: '#8b949e' },
          grid: { color: 'rgba(48,54,61,0.5)' },
          ticks: { color: '#8b949e' }
        },
        y: {
          grid: { display: false },
          ticks: { color: '#e6edf3', font: { size: 12 } }
        }
      }
    }
  });

  // 风险评分图
  new Chart(document.getElementById('riskChart'), {
    type: 'bar',
    data: {
      labels: sortedByRisk.map(s => s.name),
      datasets: [{
        data: sortedByRisk.map(s => s.riskScore),
        backgroundColor: sortedByRisk.map(s => s.riskScore >= 70 ? 'rgba(248,81,73,0.7)' : s.riskScore >= 50 ? 'rgba(210,153,34,0.7)' : 'rgba(63,185,80,0.7)'),
        borderWidth: 0,
        borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: '#e6edf3', font: { size: 11 }, maxRotation: 45 }
        },
        y: {
          max: 100,
          title: { display: true, text: '风险评分', color: '#8b949e' },
          grid: { color: 'rgba(48,54,61,0.5)' },
          ticks: { color: '#8b949e' }
        }
      }
    }
  });

  // PE图
  const peData = stocks.map(s => ({ name: s.name, pe: s.peTTM || 0 }));
  peData.sort((a, b) => b.pe - a.pe);
  new Chart(document.getElementById('peChart'), {
    type: 'bar',
    data: {
      labels: peData.map(d => d.name),
      datasets: [{
        data: peData.map(d => d.pe),
        backgroundColor: peData.map(d => d.pe > 200 ? 'rgba(248,81,73,0.7)' : d.pe > 80 ? 'rgba(210,153,34,0.7)' : 'rgba(88,166,255,0.7)'),
        borderWidth: 0,
        borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: '#e6edf3', font: { size: 11 }, maxRotation: 45 }
        },
        y: {
          title: { display: true, text: 'PE(TTM)', color: '#8b949e' },
          grid: { color: 'rgba(48,54,61,0.5)' },
          ticks: { color: '#8b949e' }
        }
      }
    }
  });
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tabId).classList.add('active');
  event.target.classList.add('active');
}

// 初始化
document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
